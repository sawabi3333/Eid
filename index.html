<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عيد فطر سعيد يا ولاء</title>

<style>

body{
background:linear-gradient(#020111,#191621);
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
font-family:Tahoma;
color:white;
overflow:hidden;
text-align:center;
}

.container{
z-index:2;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.stars{
position:absolute;
width:100%;
height:100%;
background:url("https://i.imgur.com/YKY28eT.png");
animation:moveStars 60s linear infinite;
opacity:0.7;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

.message{
display:none;
font-size:26px;
margin-top:20px;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 5s infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-800px);}
}

.name{
font-size:50px;
color:#ffd700;
margin-top:20px;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="container">

<h1>كل عام وأنتِ أجمل أعيادي ❤️</h1>

<button onclick="showMessage()">افتح الرسالة</button>

<div class="message" id="msg">

<p>
عيد فطر سعيد يا حبيبتي ولاء 🌙  
ربنا يجعل كل أيامك فرح وسعادة  
وكل عيد وإنتي أقرب لقلبي ❤️
</p>

<div class="name">ولاء ✨</div>

</div>

</div>

<script>

function showMessage(){
document.getElementById("msg").style.display="block";
createHearts();
}

function createHearts(){

for(let i=0;i<30;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";
heart.style.top="100%";
heart.style.fontSize=(Math.random()*20+10)+"px";
heart.style.animationDuration=(Math.random()*5+3)+"s";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
